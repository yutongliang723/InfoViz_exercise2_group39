<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Development – Exercise 2</title>
  <link rel="stylesheet" type="text/css" href="{{url_for('static',filename='styles/style.css')}}">

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.0/topojson.min.js"></script>
</head>

<body>

  <header>
    <h1>Exercise 2</h1>
    <p class="subtitle">Group 39</p>
  </header>

  <main>
    <!--  Map + PCA side-by-side  -->
    <div class="row">

      <section class="panel" id="map-panel">
        <h2>Choropleth Map</h2>
        <div class="map-year-control">
          <label for="year-slider">Year:</label>
          <input type="range" id="year-slider" min="{{ year_range.min }}" max="{{ year_range.max }}" step="1"
            value="{{ year_range.initial }}" />
          <span id="year-label">{{ year_range.initial }}</span>
        </div>
        <p class="hint">Countries coloured by the selected indicator at the chosen year. Click to plot time series.
          Scroll to zoom, drag to pan.</p>
        <div id="map-container">
          <button type="button" id="map-reset-zoom" title="Reset view" aria-label="Reset view">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
              <path fill="currentColor" d="M12 3 4 10v11h5v-6h6v6h5V10z" />
            </svg>
          </button>
        </div>
        <div id="map-legend"></div>
      </section>

      <section class="panel" id="pca-panel">
        <h2>PCA Scatterplot
          <span class="year-badge" id="pca-year-label"></span>
        </h2>
        <p class="hint">Hover or click a dot to highlight the country.</p>
        <div id="pca-container"></div>
        <div id="pca-message" class="hidden">PCA data not available</div>
        <div id="pca-legend"></div>
      </section>

    </div>

    <!--  Global controls — indicator drives all three views  -->
    <div class="controls">
      <label for="indicator-select">Indicator:</label>
      <select id="indicator-select"></select>
    </div>
    <!--  Time series  -->
    <div class="row">

      <section class="panel" id="ts-panel">
        <h2>Time Series <span id="ts-country"></span></h2>
        <div id="ts-container">
          <div class="ts-inner"></div>
        </div>
        <div id="ts-legend"></div>
      </section>

    </div>

  </main>

  <!--  Tooltip  -->
  <div id="tooltip" class="tooltip hidden"></div>

  <!--  Inject server data via Jinja2  -->
  <script id="server-data" type="application/json">
  {{ {
    "countries": countries,
    "pca_data": pca_data,
    "timeseries": timeseries,
    "features": features,
    "country_ids": country_ids,
    "country_regions": country_regions
  } | tojson }}
</script>

  <!--  Application modules  -->
  <script src="{{ url_for('static', filename='js/state.js') }}"></script>
  <script src="{{ url_for('static', filename='js/pca.js') }}"></script>
  <script src="{{ url_for('static', filename='js/map.js') }}"></script>
  <script src="{{ url_for('static', filename='js/timeseries.js') }}"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>

</html>
